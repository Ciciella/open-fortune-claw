<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>交易Dashboard - 甜瓜机器人</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 30px; font-size: 2rem; }
    h1 span { color: #00ff88; }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      backdrop-filter: blur(10px);
    }
    .stat-card .label { color: #888; font-size: 0.9rem; margin-bottom: 10px; }
    .stat-card .value { font-size: 1.8rem; font-weight: bold; }
    .stat-card .value.green { color: #00ff88; }
    .stat-card .value.red { color: #ff4757; }
    
    .section { margin-bottom: 30px; }
    .section h2 { margin-bottom: 15px; color: #00ff88; }
    
    table { 
      width: 100%; 
      border-collapse: collapse; 
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      overflow: hidden;
    }
    th, td { padding: 12px 15px; text-align: left; }
    th { background: rgba(0,255,136,0.2); font-weight: 600; }
    tr { border-bottom: 1px solid rgba(255,255,255,0.1); }
    tr:hover { background: rgba(255,255,255,0.05); }
    
    .type-open { color: #00ff88; }
    .type-close { color: #ff4757; }
    .side-long { color: #00ff88; }
    .side-short { color: #ff4757; }
    
    .refresh-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #00ff88;
      color: #1a1a2e;
      border: none;
      padding: 15px 25px;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,255,136,0.3);
    }
    .refresh-btn:hover { transform: scale(1.05); }
    
    .time { color: #666; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🍈 交易<span>Dashboard</span></h1>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">总交易次数</div>
        <div class="value" id="totalTrades">-</div>
      </div>
      <div class="stat-card">
        <div class="label">今日交易</div>
        <div class="value" id="todayTrades">-</div>
      </div>
      <div class="stat-card">
        <div class="label">总盈亏</div>
        <div class="value" id="totalPnl">-</div>
      </div>
      <div class="stat-card">
        <div class="label">今日盈亏</div>
        <div class="value" id="todayPnl">-</div>
      </div>
    </div>
    
    <div class="section">
      <h2>📊 最近交易记录</h2>
      <table>
        <thead>
          <tr>
            <th>时间</th>
            <th>类型</th>
            <th>方向</th>
            <th>数量</th>
            <th>价格</th>
            <th>策略</th>
            <th>原因</th>
          </tr>
        </thead>
        <tbody id="tradesTable">
          <tr><td colspan="7" style="text-align:center">加载中...</td></tr>
        </tbody>
      </table>
    </div>
    
    <div class="section">
      <h2>📈 当前持仓</h2>
      <table>
        <thead>
          <tr>
            <th>交易对</th>
            <th>方向</th>
            <th>数量</th>
            <th>开仓价</th>
            <th>当前价</th>
            <th>盈亏</th>
            <th>更新时间</th>
          </tr>
        </thead>
        <tbody id="positionsTable">
          <tr><td colspan="7" style="text-align:center">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  
  <button class="refresh-btn" onclick="loadData()">🔄 刷新</button>
  
  <script>
    async function loadData() {
      try {
        const API_URL = 'https://disabilities-analyses-cosmetics-alone.trycloudflare.com/api/trades';
        const response = await fetch(API_URL);
        const data = await response.json();
        
        // 更新统计
        document.getElementById('totalTrades').textContent = data.stats.totalTrades || 0;
        document.getElementById('todayTrades').textContent = data.stats.todayTrades || 0;
        
        const totalPnl = data.stats.totalPnl || 0;
        const todayPnl = data.stats.todayPnl || 0;
        
        document.getElementById('totalPnl').textContent = (totalPnl >= 0 ? '+' : '') + totalPnl.toFixed(2) + ' USDT';
        document.getElementById('totalPnl').className = 'value ' + (totalPnl >= 0 ? 'green' : 'red');
        
        document.getElementById('todayPnl').textContent = (todayPnl >= 0 ? '+' : '') + todayPnl.toFixed(2) + ' USDT';
        document.getElementById('todayPnl').className = 'value ' + (todayPnl >= 0 ? 'green' : 'red');
        
        // 更新交易记录
        const tradesHtml = data.trades.map(t => {
          const time = new Date(t.timestamp).toLocaleString('zh-CN');
          return `<tr>
            <td class="time">${time}</td>
            <td class="type-${t.type}">${t.type === 'open' ? '开仓' : '平仓'}</td>
            <td class="side-${t.side}">${t.side === 'long' ? '多' : '空'}</td>
            <td>${t.amount}</td>
            <td>$${t.price.toLocaleString()}</td>
            <td>${t.strategy}</td>
            <td>${t.reason || '-'}</td>
          </tr>`;
        }).join('');
        document.getElementById('tradesTable').innerHTML = tradesHtml || '<tr><td colspan="7" style="text-align:center">暂无记录</td></tr>';
        
        // 更新持仓
        const positionsHtml = data.positions.map(p => {
          const pnl = p.pnl || 0;
          return `<tr>
            <td>${p.symbol}</td>
            <td class="side-${p.side}">${p.side === 'long' ? '多' : '空'}</td>
            <td>${p.amount || 0}</td>
            <td>$${(p.entry_price || 0).toLocaleString()}</td>
            <td>$${(p.current_price || 0).toLocaleString()}</td>
            <td class="${pnl >= 0 ? 'type-open' : 'type-close'}">${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}</td>
            <td class="time">${p.updated_at ? new Date(p.updated_at).toLocaleString('zh-CN') : '-'}</td>
          </tr>`;
        }).join('');
        document.getElementById('positionsTable').innerHTML = positionsHtml || '<tr><td colspan="7" style="text-align:center">无持仓</td></tr>';
        
      } catch (e) {
        console.error('加载失败:', e);
      }
    }
    
    loadData();
    setInterval(loadData, 10000); // 每10秒自动刷新
  </script>
</body>
</html>
